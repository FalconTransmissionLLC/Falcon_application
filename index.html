<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Falcon Transmission — Complete Digital Shop Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root {
    --red: #e8273a;
    --red-glow: rgba(232, 39, 58, 0.35);
    --red-dim: rgba(232, 39, 58, 0.12);
    --red-mid: rgba(232, 39, 58, 0.22);
    --bg: #080909;
    --surface-1: #0f1011;
    --surface-2: #161819;
    --surface-3: #1d2022;
    --border: rgba(255,255,255,0.07);
    --border-bright: rgba(255,255,255,0.13);
    --text-1: #f0ece8;
    --text-2: #7a7570;
    --text-3: #4a4642;
    --silver: #b8b4b0;
    --green: #22c55e;
    --green-glow: rgba(34, 197, 94, 0.25);
    --green-dim: rgba(34, 197, 94, 0.12);
    --amber: #f59e0b;
    --amber-dim: rgba(245, 158, 11, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    font-family: 'Barlow', sans-serif;
    background: var(--bg);
    color: var(--text-1);
    overflow: hidden;
  }

  /* Subtle noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(180deg, #131516 0%, #0f1011 100%);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    flex-shrink: 0;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, var(--red) 30%, var(--red) 70%, transparent 100%);
    opacity: 0.5;
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 38px;
    height: 38px;
    position: relative;
    flex-shrink: 0;
  }

  .logo-mark svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 6px var(--red-glow));
  }

  .header-wordmark {
    display: flex;
    flex-direction: column;
    line-height: 1;
    gap: 1px;
  }

  .header-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-1);
  }

  .header-sub {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-2);
  }

  .sync-status {
    font-size: 10px;
    color: var(--green);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 5px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .sync-dot {
    width: 6px;
    height: 6px;
    background: var(--green);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--green); }
    50% { opacity: 0.5; box-shadow: 0 0 2px var(--green); }
  }

  /* ── CONTENT ── */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 14px 14px 20px;
    background: var(--bg);
    scrollbar-width: thin;
    scrollbar-color: var(--surface-3) transparent;
  }

  /* ── NAV TABS ── */
  .nav-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }

  .nav-tabs::-webkit-scrollbar { display: none; }

  .nav-tab {
    flex-shrink: 0;
    padding: 8px 13px;
    border: 1px solid var(--border);
    background: var(--surface-1);
    color: var(--text-2);
    border-radius: 6px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    position: relative;
    overflow: hidden;
  }

  .nav-tab::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--red-dim);
    opacity: 0;
    transition: opacity 0.18s;
  }

  .nav-tab:hover::before { opacity: 1; }
  .nav-tab:hover { color: var(--text-1); border-color: var(--border-bright); }

  .nav-tab.active {
    background: var(--red);
    color: #fff;
    border-color: var(--red);
    box-shadow: 0 0 16px var(--red-glow), inset 0 1px 0 rgba(255,255,255,0.15);
  }

  .nav-tab.active::before { display: none; }

  /* ── SECTION ── */
  .section { display: none; animation: fadeIn 0.2s ease; }
  .section.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── STAT GRID ── */
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }

  .stat-box {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 12px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .stat-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--red), transparent);
    opacity: 0.6;
  }

  .stat-box::after {
    content: '';
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 40px;
    background: var(--red-glow);
    border-radius: 50%;
    filter: blur(20px);
    pointer-events: none;
  }

  .stat-label {
    font-size: 9px;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 700;
    margin-bottom: 6px;
    font-family: 'Barlow Condensed', sans-serif;
  }

  .stat-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 44px;
    font-weight: 900;
    color: var(--red);
    line-height: 1;
    text-shadow: 0 0 20px var(--red-glow);
    letter-spacing: -1px;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.18s;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--red) 0%, transparent 100%);
    opacity: 0;
    transition: opacity 0.18s;
    border-radius: 3px 0 0 3px;
  }

  .card:hover {
    border-color: var(--border-bright);
    background: var(--surface-2);
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  .card:hover::before { opacity: 1; }
  .card:active { transform: scale(0.99); }

  .card-header {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 800;
    color: var(--red);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  /* ── BUTTONS ── */
  .btn {
    padding: 12px 16px;
    border: none;
    border-radius: 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
    text-transform: uppercase;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    width: 100%;
    margin-bottom: 8px;
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.06);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .btn:hover::after { opacity: 1; }
  .btn:active { transform: scale(0.98); }

  .btn-primary {
    background: linear-gradient(160deg, #e8273a 0%, #c01e2e 100%);
    color: white;
    box-shadow: 0 4px 18px var(--red-glow), inset 0 1px 0 rgba(255,255,255,0.15);
    border: 1px solid rgba(255,80,80,0.2);
  }

  .btn-secondary {
    background: var(--surface-2);
    color: var(--text-1);
    border: 1px solid var(--border-bright);
  }

  .btn-secondary:hover { border-color: rgba(255,255,255,0.22); }

  .btn-success {
    background: linear-gradient(160deg, #22c55e 0%, #16a34a 100%);
    color: white;
    box-shadow: 0 4px 18px var(--green-glow), inset 0 1px 0 rgba(255,255,255,0.15);
    border: 1px solid rgba(34,197,94,0.2);
  }

  .btn-small {
    padding: 8px 12px;
    font-size: 11px;
    margin-bottom: 4px;
  }

  /* ── FORMS ── */
  .form-group { margin-bottom: 13px; }

  label {
    display: block;
    font-size: 9px;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 700;
    margin-bottom: 5px;
    font-family: 'Barlow Condensed', sans-serif;
  }

  input, select, textarea {
    width: 100%;
    padding: 10px 12px;
    background: var(--surface-2);
    border: 1px solid var(--border-bright);
    border-radius: 7px;
    color: var(--text-1);
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    transition: all 0.18s;
  }

  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--red);
    background: var(--surface-3);
    box-shadow: 0 0 0 3px var(--red-dim), 0 0 12px rgba(232,39,58,0.08);
  }

  textarea { resize: vertical; min-height: 80px; }

  select option {
    background: var(--surface-2);
    color: var(--text-1);
  }

  .checkbox-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }

  .checkbox-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 500;
  }

  .checkbox-item input {
    width: 16px;
    height: 16px;
    margin: 0;
    cursor: pointer;
    accent-color: var(--red);
    border-radius: 3px;
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.88);
    backdrop-filter: blur(4px);
    z-index: 1000;
    display: flex;
    align-items: flex-end;
    animation: overlayIn 0.25s ease;
  }

  @keyframes overlayIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal {
    background: var(--surface-1);
    width: 100%;
    border-radius: 16px 16px 0 0;
    max-height: 92vh;
    overflow-y: auto;
    padding: 20px;
    padding-bottom: 44px;
    animation: sheetUp 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    border-top: 1px solid var(--border-bright);
    scrollbar-width: thin;
    scrollbar-color: var(--surface-3) transparent;
    position: relative;
  }

  .modal::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--red), transparent);
    opacity: 0.4;
  }

  @keyframes sheetUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-header {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 900;
    margin-bottom: 18px;
    color: var(--text-1);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .modal-header::before {
    content: '';
    display: block;
    width: 4px;
    height: 22px;
    background: var(--red);
    border-radius: 2px;
    box-shadow: 0 0 8px var(--red-glow);
    flex-shrink: 0;
  }

  .modal-close {
    position: fixed;
    top: 14px;
    right: 14px;
    background: var(--surface-3);
    border: 1px solid var(--border-bright);
    color: var(--text-2);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    z-index: 1001;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .modal-close:hover {
    background: var(--red);
    color: white;
    border-color: var(--red);
  }

  /* ── SIGNATURE CANVAS ── */
  .canvas-container {
    border: 1px solid var(--border-bright);
    border-radius: 8px;
    background: #0c0d0e;
    padding: 6px;
    margin-bottom: 8px;
    position: relative;
  }

  .canvas-container::before {
    content: 'Sign here';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 11px;
    color: var(--text-3);
    letter-spacing: 2px;
    text-transform: uppercase;
    pointer-events: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
  }

  canvas {
    width: 100%;
    height: 180px;
    display: block;
    cursor: crosshair;
    border-radius: 4px;
  }

  /* ── LINE ITEMS ── */
  .line-items { margin: 14px 0; }

  .line-item {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
    position: relative;
  }

  .line-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--red);
    border-radius: 2px 0 0 2px;
    opacity: 0.5;
  }

  .line-item-remove {
    background: rgba(232,39,58,0.12);
    color: var(--red);
    border: 1px solid rgba(232,39,58,0.25);
    border-radius: 5px;
    padding: 5px 10px;
    font-size: 10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.15s;
  }

  .line-item-remove:hover {
    background: var(--red);
    color: white;
    border-color: var(--red);
  }

  /* ── TOTALS ── */
  .totals {
    background: var(--surface-2);
    border: 1px solid var(--border-bright);
    border-radius: 10px;
    padding: 14px;
    margin: 14px 0;
    position: relative;
    overflow: hidden;
  }

  .totals::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 40px;
    background: linear-gradient(0deg, var(--red-dim) 0%, transparent 100%);
    pointer-events: none;
  }

  .totals-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 13px;
    color: var(--text-2);
    font-weight: 500;
  }

  .totals-row.total {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 20px;
    color: var(--red);
    text-transform: uppercase;
    letter-spacing: 1px;
    border-top: 1px solid var(--border-bright);
    padding-top: 10px;
    margin-top: 6px;
    text-shadow: 0 0 20px var(--red-glow);
    position: relative;
    z-index: 1;
  }

  /* ── STATUS BADGES ── */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px 3px 6px;
    border-radius: 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .status-badge::before {
    content: '';
    width: 5px;
    height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .status-unpaid {
    background: var(--red-dim);
    color: var(--red);
    border: 1px solid rgba(232,39,58,0.2);
  }

  .status-unpaid::before { background: var(--red); }

  .status-paid {
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid rgba(34,197,94,0.2);
  }

  .status-paid::before { background: var(--green); }

  .status-open {
    background: var(--amber-dim);
    color: var(--amber);
    border: 1px solid rgba(245,158,11,0.2);
  }

  .status-open::before { background: var(--amber); }

  /* ── EMPTY STATES ── */
  .empty {
    text-align: center;
    padding: 40px 16px;
    color: var(--text-3);
  }

  .empty-icon {
    font-size: 40px;
    margin-bottom: 10px;
    opacity: 0.4;
    filter: grayscale(1);
  }

  .empty p {
    font-size: 12px;
    letter-spacing: 0.5px;
    font-weight: 500;
  }

  /* ── DASHBOARD ITEM ── */
  .dash-item {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .dash-item:last-child { border-bottom: none; }

  /* ── DIVIDER ── */
  .section-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 16px 0 12px;
  }

  .section-divider span {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-3);
    white-space: nowrap;
  }

  .section-divider::before, .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── SEARCH INPUT ── */
  .search-wrap {
    position: relative;
    margin-bottom: 10px;
  }

  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-3);
    font-size: 16px;
    pointer-events: none;
  }

  .search-wrap input {
    padding-left: 32px;
  }

  /* ── INVOICE HEADER in modal ── */
  .inv-brand {
    text-align: center;
    padding-bottom: 14px;
    margin-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  .inv-brand-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 900;
    color: var(--red);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .inv-brand-sub {
    font-size: 10px;
    color: var(--text-2);
    margin-top: 3px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-family: 'Barlow Condensed', sans-serif;
  }

  /* ── ROW DETAIL ── */
  .detail-row {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    font-size: 12px;
    border-bottom: 1px solid var(--border);
  }

  .detail-row:last-child { border-bottom: none; }

  .detail-row span:first-child { color: var(--text-2); }
  .detail-row span:last-child { font-weight: 600; color: var(--text-1); }

  /* ── SERVICES LIST ── */
  .service-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    color: var(--text-1);
  }

  .service-item:last-child { border-bottom: none; }

  .service-item::before {
    content: '';
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
  }

  /* Mobile scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">

        <div class="header-name">Falcon</div>
        <div class="header-sub">Transmission LLC</div>
      </div>

      <div class="sync-dot"></div>
      <span>Saved</span>
    </div>

  <div class="content">
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchTab('dashboard', this)">Dashboard</button>
      <button class="nav-tab" onclick="switchTab('repair-orders', this)">Repair Orders</button>
      <button class="nav-tab" onclick="switchTab('invoices', this)">Invoices</button>
      <button class="nav-tab" onclick="switchTab('customers', this)">Customers</button>
    </div>

    <!-- DASHBOARD -->
    <div class="section active" id="section-dashboard">
      <div class="stat-grid">
        <div class="stat-box">
          <div class="stat-label">Open Orders</div>
          <div class="stat-value" id="stat-open">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Unpaid Invoices</div>
          <div class="stat-value" id="stat-unpaid">0</div>
        </div>
      </div>

      <div class="card" style="cursor:default;">
        <div class="card-header">Recent Orders</div>
        <div id="dashboard-content">
          <div class="empty"><div class="empty-icon">🛠️</div><p>No orders yet</p></div>
        </div>
      </div>

      <button class="btn btn-primary" onclick="newRepairOrder()">+ New Repair Order</button>
    </div>

    <!-- REPAIR ORDERS -->
    <div class="section" id="section-repair-orders">
      <div style="margin-bottom: 12px;">
        <div class="search-wrap"><input type="text" id="ro-search" placeholder="Search order…" oninput="renderRepairOrders()"/></div>
        <button class="btn btn-primary" onclick="newRepairOrder()">+ New Repair Order</button>
      </div>
      <div id="repair-orders-list">
        <div class="empty"><div class="empty-icon">🛠️</div><p>No repair orders</p></div>
      </div>
    </div>

    <!-- INVOICES -->
    <div class="section" id="section-invoices">
      <div style="margin-bottom: 12px;">
        <div class="search-wrap"><input type="text" id="inv-search" placeholder="Search invoice…" oninput="renderInvoices()"/></div>
      </div>
      <div id="invoices-list">
        <div class="empty"><div class="empty-icon">🧾</div><p>Create invoices from repair orders</p></div>
      </div>
    </div>

    <!-- CUSTOMERS -->
    <div class="section" id="section-customers">
      <div style="margin-bottom: 12px;">
        <div class="search-wrap"><input type="text" id="cust-search" placeholder="Search customer…" oninput="renderCustomers()"/></div>
        <button class="btn btn-primary" onclick="newCustomer()">+ Add Customer</button>
      </div>
      <div id="customers-list">
        <div class="empty"><div class="empty-icon">👥</div><p>No customers</p></div>
      </div>
    </div>

<div id="modal-container"></div>

<script>
const DB_KEY = 'falcon_complete_v2';

let db = {
  repairOrders: [],
  invoices: [],
  customers: [],
  roCounter: 1000,
  invCounter: 5000,
  custCounter: 100
};

const REPAIR_SERVICES = [
  'Transmission Fluid Service','Transmission Fluid & Filter Change','Transmission Rebuild',
  'Transmission Replacement','Torque Converter Service','Torque Converter Replacement',
  'Transmission Flush','Transmission Pan Gasket Replacement','Solenoid Replacement',
  'Seal Replacement','Pressure Test','Diagnostic Scan','Shift Solenoid',
  'Input Shaft Seal','Output Shaft Seal','Transmission Filter Change',
  'Fluid Top-Up','Cooler Line Flush','Full Transmission Overhaul','CVT Service'
];

function saveData() {
  try { localStorage.setItem(DB_KEY, JSON.stringify(db)); } catch(e) {}
}

function loadData() {
  try {
    const stored = localStorage.getItem(DB_KEY);
    if(stored) db = JSON.parse(stored);
  } catch(e) {}
}

loadData();

function switchTab(tabName, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('section-' + tabName).classList.add('active');
  el.classList.add('active');
  if(tabName === 'dashboard') renderDashboard();
  if(tabName === 'repair-orders') renderRepairOrders();
  if(tabName === 'invoices') renderInvoices();
  if(tabName === 'customers') renderCustomers();
}

function statusClass(s) {
  if(s === 'Complete') return 'status-paid';
  if(s === 'In Progress') return 'status-open';
  return 'status-open';
}

function renderDashboard() {
  const open = db.repairOrders.filter(r => r.status !== 'Complete').length;
  const unpaid = db.invoices.filter(i => i.status === 'Unpaid').length;
  document.getElementById('stat-open').textContent = open;
  document.getElementById('stat-unpaid').textContent = unpaid;

  const recent = db.repairOrders.slice(-3).reverse();
  const html = recent.length === 0
    ? '<div class="empty"><div class="empty-icon">🛠️</div><p>No orders yet</p></div>'
    : recent.map(r => `
      <div class="dash-item">
        <div>
          <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;color:var(--red);letter-spacing:.5px;">${r.roNumber}</div>
          <div style="font-size:12px;font-weight:500;color:var(--text-1);margin-top:1px;">${r.customerName}</div>
          <div style="font-size:11px;color:var(--text-2);">${r.vehicle}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;color:var(--text-1);">$${r.total.toFixed(2)}</div>
          <span class="status-badge ${statusClass(r.status)}">${r.status}</span>
        </div>
      </div>`).join('');
  document.getElementById('dashboard-content').innerHTML = html;
}

function newRepairOrder() {
  const customers = db.customers.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  let roNum = 'RO-' + (++db.roCounter);

  const html = `
  <div class="modal-overlay" id="ro-modal" onclick="if(event.target.id==='ro-modal') closeModal()">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">New Repair Order</div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--red);margin-bottom:16px;letter-spacing:1px;">${roNum}</div>

      <div class="form-group">
        <label>Customer *</label>
        <select id="ro-cust">
          <option value="">— Select Customer —</option>
          ${customers}
        </select>
      </div>
      <div class="form-group">
        <label>Vehicle (Year Make Model) *</label>
        <input type="text" id="ro-vehicle" placeholder="2018 Ford F-150"/>
      </div>
      <div class="form-group">
        <label>VIN</label>
        <input type="text" id="ro-vin"/>
      </div>
      <div class="form-group">
        <label>Mileage</label>
        <input type="number" id="ro-mileage"/>
      </div>

      <div class="form-group">
        <label>Services</label>
        <div class="checkbox-group" id="services-group">
          ${REPAIR_SERVICES.map(s => `
            <label class="checkbox-item">
              <input type="checkbox" value="${s}" class="service-check"/>
              ${s}
            </label>`).join('')}
        </div>
      </div>

      <div class="form-group">
        <label>Notes / Details</label>
        <textarea id="ro-notes" placeholder="Additional service details…"></textarea>
      </div>

      <div id="ro-line-items" class="line-items"></div>
      <button class="btn btn-secondary btn-small" onclick="addLineItem()">+ Add Line Item</button>

      <div class="totals">
        <div class="totals-row"><span>Subtotal</span><span id="ro-subtotal">$0.00</span></div>
        <div class="totals-row"><span>Tax (8.25%)</span><span id="ro-tax">$0.00</span></div>
        <div class="totals-row total"><span>Total Due</span><span id="ro-total">$0.00</span></div>
      </div>

      <div class="form-group">
        <label>Status</label>
        <select id="ro-status">
          <option>Open</option>
          <option>In Progress</option>
          <option>Complete</option>
        </select>
      </div>

      <button class="btn btn-primary" onclick="saveRepairOrder('${roNum}')">Save Repair Order</button>
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    </div>
  </div>`;

  document.getElementById('modal-container').innerHTML = html;
  currentLineItems = [];
  setupLineItemsUI();
}

let currentLineItems = [];

function addLineItem() {
  currentLineItems.push({desc:'', type:'Service', qty:1, price:0});
  renderLineItemsUI();
}

function renderLineItemsUI() {
  const container = document.getElementById('ro-line-items');
  if(!container) return;
  container.innerHTML = currentLineItems.map((item, i) => `
    <div class="line-item">
      <div style="margin-bottom:8px;">
        <input type="text" value="${item.desc}" style="font-size:12px;padding:7px;" placeholder="Description" oninput="currentLineItems[${i}].desc=this.value; updateTotals()"/>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px;">
        <div>
          <label style="font-size:9px;margin-bottom:3px;">Qty</label>
          <input type="number" value="${item.qty}" style="font-size:12px;padding:7px;" oninput="currentLineItems[${i}].qty=+this.value; updateTotals()"/>
        </div>
        <div>
          <label style="font-size:9px;margin-bottom:3px;">Unit Price</label>
          <input type="number" value="${item.price}" step="0.01" style="font-size:12px;padding:7px;" oninput="currentLineItems[${i}].price=+this.value; updateTotals()"/>
        </div>
      </div>
      <div style="text-align:right;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;color:var(--red);margin:4px 0 6px;">$${(item.qty * item.price).toFixed(2)}</div>
      <button class="line-item-remove" onclick="currentLineItems.splice(${i},1); renderLineItemsUI(); updateTotals();">Remove</button>
    </div>`).join('');
}

function setupLineItemsUI() { updateTotals(); }

function updateTotals() {
  const subtotal = currentLineItems.reduce((a, li) => a + (li.qty * li.price), 0);
  const tax = subtotal * 0.0825;
  const total = subtotal + tax;
  const s = document.getElementById('ro-subtotal');
  const t = document.getElementById('ro-tax');
  const tot = document.getElementById('ro-total');
  if(s) s.textContent = '$' + subtotal.toFixed(2);
  if(t) t.textContent = '$' + tax.toFixed(2);
  if(tot) tot.textContent = '$' + total.toFixed(2);
}

  const cust = db.customers.find(c => c.id === custId);
  const selectedServices = Array.from(document.querySelectorAll('.service-check:checked')).map(c => c.value);
  const subtotal = currentLineItems.reduce((a, li) => a + (li.qty * li.price), 0);
  const tax = subtotal * 0.0825;
  const ro = {
    id: 'ro_' + Date.now(),
    roNumber: roNum,
    customerId: custId,
    customerName: cust.name,
    phone: cust.phone,
    email: cust.email,
    vehicle,
    vin: document.getElementById('ro-vin').value.trim(),
    mileage: document.getElementById('ro-mileage').value,
    services: selectedServices,
    notes: document.getElementById('ro-notes').value.trim(),
    lineItems: JSON.parse(JSON.stringify(currentLineItems)),
    subtotal: parseFloat(subtotal.toFixed(2)),
    tax: parseFloat(tax.toFixed(2)),

    status: document.getElementById('ro-status').value,

function initSignaturePad() {
  const canvas = document.getElementById('signature-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = 180;
  let isDrawing = false;

  canvas.addEventListener('mousedown', (e) => {
    isDrawing = true;
    const pos = getPos(e, canvas);
    ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
  });
  canvas.addEventListener('mousemove', (e) => {
    if(!isDrawing) return;
    const pos = getPos(e, canvas);
    ctx.lineTo(pos.x, pos.y);
    ctx.strokeStyle = '#e8273a'; ctx.lineWidth = 2;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
  });
  canvas.addEventListener('mouseup', () => { isDrawing = false; });
  canvas.addEventListener('mouseleave', () => { isDrawing = false; });
  canvas.addEventListener('touchstart', (e) => {
    isDrawing = true;
    const pos = getTouchPos(e, canvas);
    ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
  }, {passive:true});
  canvas.addEventListener('touchmove', (e) => {
    if(!isDrawing) return;
    const pos = getTouchPos(e, canvas);
    ctx.lineTo(pos.x, pos.y);
    ctx.strokeStyle = '#e8273a'; ctx.lineWidth = 2;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
  }, {passive:true});
  canvas.addEventListener('touchend', () => { isDrawing = false; });
}

function getPos(e, canvas) {
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function getTouchPos(e, canvas) {
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
}

function clearSignature() {
  const canvas = document.getElementById('signature-canvas');
  if(canvas) canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}

function saveSignature(roId) {
