<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Falcon Transmission - Professional Shop Management & Quoting System">
    <meta name="theme-color" content="#111827">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Falcon TX">
    <meta property="og:title" content="Falcon Transmission Shop Manager">
    <meta property="og:description" content="Professional transmission shop management and quoting system">
    <meta property="og:type" content="web application">
    <title>Falcon Transmission - Shop Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #111827 0%, #1f2937 50%, #111827 100%);
            color: #fff;
            line-height: 1.5;
            overflow-x: hidden;
        }

        body {
            -webkit-user-select: none;
            user-select: none;
        }

        input, select, textarea, button {
            font-family: inherit;
            font-size: inherit;
            -webkit-user-select: text;
            user-select: text;
        }

        #root {
            min-height: 100vh;
            width: 100%;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1f2937;
        }

        ::-webkit-scrollbar-thumb {
            background: #FF6B35;
            border-radius: 4px;
        }

        .container {
            max-width: 1024px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .btn {
            padding: 0.75rem 1rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #FF6B35 0%, #FF5722 100%);
            color: white;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #FF7A4A 0%, #FF6A35 100%);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #4b5563;
            color: white;
            border: 1px solid #6b7785;
        }

        .btn-secondary:hover {
            background: #5b6573;
            border-color: #FF6B35;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .input-field {
            background: #374151;
            border: 1px solid #4b5563;
            color: white;
            padding: 0.75rem;
            border-radius: 0.5rem;
            width: 100%;
            transition: border-color 0.2s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #FF6B35;
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }

        select.input-field {
            cursor: pointer;
        }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        @media (min-width: 640px) {
            .icon-grid {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
                gap: 1.5rem;
            }
        }

        @media (min-width: 768px) {
            .icon-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .icon-btn {
            background: #374151;
            border: 2px solid #4b5563;
            border-radius: 1rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
            text-decoration: none;
            aspect-ratio: 1;
        }

        .icon-btn:hover {
            border-color: #FF6B35;
            background: #4b5563;
            transform: scale(1.05);
        }

        .icon-btn.highlight {
            background: linear-gradient(135deg, #FF6B35 0%, #FF5722 100%);
            border-color: #FFB347;
        }

        .icon-btn.highlight:hover {
            background: linear-gradient(135deg, #FF7A4A 0%, #FF6A35 100%);
        }

        .icon-btn-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        @media (min-width: 640px) {
            .icon-btn-icon {
                font-size: 2.5rem;
            }
        }

        .icon-btn-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-align: center;
            line-height: 1.2;
        }

        @media (min-width: 640px) {
            .icon-btn-label {
                font-size: 0.875rem;
            }
        }

        .card {
            background: #374151;
            border: 1px solid #4b5563;
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: border-color 0.2s ease;
        }

        .card:hover {
            border-color: #FF6B35;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #fff;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
        }

        .modal {
            background: #1f2937;
            border: 2px solid #FF6B35;
            border-radius: 1rem;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem;
            border-bottom: 1px solid #4b5563;
        }

        .modal-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: 1.5rem;
            padding: 0;
            width: 2rem;
            height: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            color: #FF6B35;
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .modal-footer {
            padding: 1.5rem;
            border-top: 1px solid #4b5563;
            display: flex;
            gap: 1rem;
        }

        .grid {
            display: grid;
            gap: 1rem;
        }

        .grid-2 {
            grid-template-columns: 1fr;
        }

        @media (min-width: 640px) {
            .grid-2 {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .grid-4 {
            grid-template-columns: repeat(2, 1fr);
        }

        @media (min-width: 768px) {
            .grid-4 {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .back-btn {
            color: #FF6B35;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 1rem;
        }

        .back-btn:hover {
            color: #FFB347;
        }

        .section {
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 1.125rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #fff;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.375rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .badge-success {
            background: #10b981;
            color: white;
        }

        .badge-warning {
            background: #f59e0b;
            color: white;
        }

        .badge-danger {
            background: #ef4444;
            color: white;
        }

        .price {
            font-size: 1.25rem;
            font-weight: 700;
            color: #FF6B35;
        }

        .total-line {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid #4b5563;
        }

        .total-line.final {
            border-bottom: 2px solid #FF6B35;
            font-size: 1.25rem;
            font-weight: 700;
            padding-top: 1rem;
        }

        .time-display {
            background: rgba(75, 85, 99, 0.5);
            border: 1px solid #4b5563;
            border-radius: 0.5rem;
            padding: 1rem;
            text-align: center;
            font-family: 'Courier New', monospace;
            color: #d1d5db;
            font-size: 0.875rem;
        }

        .quote-item {
            background: #4b5563;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .quote-item-info h4 {
            margin-bottom: 0.25rem;
            color: #fff;
            font-weight: 600;
        }

        .quote-item-info p {
            color: #d1d5db;
            font-size: 0.875rem;
        }

        .quote-item-action {
            flex-shrink: 0;
            margin-left: 1rem;
        }

        .hidden {
            display: none;
        }

        .text-center {
            text-align: center;
        }

        .text-gray-400 {
            color: #9ca3af;
        }

        .text-orange {
            color: #FF6B35;
        }

        .mb-1 { margin-bottom: 0.25rem; }
        .mb-2 { margin-bottom: 0.5rem; }
        .mb-4 { margin-bottom: 1rem; }
        .mb-6 { margin-bottom: 1.5rem; }

        .mt-2 { margin-top: 0.5rem; }
        .mt-4 { margin-top: 1rem; }
        .mt-6 { margin-top: 1.5rem; }

        .page {
            min-height: 100vh;
            background: linear-gradient(180deg, #111827 0%, #1f2937 50%, #111827 100%);
            padding: 1rem;
        }

        @media (min-width: 640px) {
            .page {
                padding: 1.5rem;
            }
        }

        .home-header {
            margin-bottom: 2rem;
        }

        .home-title {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #FFB347 0%, #FF6B35 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        @media (min-width: 640px) {
            .home-title {
                font-size: 2.25rem;
            }
        }

        .home-subtitle {
            color: #9ca3af;
            font-size: 0.875rem;
        }

        @media print {
            body {
                background: white;
                color: #000;
            }
            .page {
                background: white;
                padding: 0;
            }
            .no-print, .back-btn, button, .modal-overlay {
                display: none !important;
            }
            .card {
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        let appState = {
            currentView: 'home',
            showVINModal: false,
            currentQuote: null,
            quotes: [
                { id: 1, quoteNumber: 'FL-001234', customer: 'John Doe', vehicle: '2015 Chevy Silverado', transmission: '4L60E', status: 'pending', total: 3450.00, date: '2024-01-15' },
                { id: 2, quoteNumber: 'FL-001235', customer: 'Jane Smith', vehicle: '2018 Ford F-150', transmission: '10R80', status: 'approved', total: 4250.00, date: '2024-01-16' }
            ]
        };

        const PARTS_CATALOG = {
            'AW 450-43LE': {
                name: 'AW 450-43LE',
                parts: [
                    { id: '49122', name: 'Overdrive Direct Steel', qty: 3, price: 45.00, availability: 'in_stock' },
                    { id: '49124', name: '2nd Brake Steel', qty: 5, price: 55.00, availability: 'in_stock' },
                    { id: '49134', name: 'Low Reverse Steel', qty: 6, price: 50.00, availability: 'special_order' },
                    { id: '49140', name: 'Overdrive Brake Plate', qty: 1, price: 125.00, availability: 'in_stock' },
                    { id: '49320K', name: 'Valve Body Gasket Kit', qty: 1, price: 85.00, availability: 'in_stock' },
                ]
            },
            '4L60E': {
                name: '4L60E (GM)',
                parts: [
                    { id: 'GM-1', name: 'Forward Clutch Pack', qty: 1, price: 145.00, availability: 'in_stock' },
                    { id: 'GM-2', name: 'Direct Clutch Pack', qty: 1, price: 155.00, availability: 'in_stock' },
                    { id: 'GM-3', name: 'Low/Reverse Clutch', qty: 1, price: 165.00, availability: 'special_order' },
                    { id: 'GM-4', name: 'Input Shaft', qty: 1, price: 225.00, availability: 'in_stock' },
                    { id: 'GM-5', name: 'Output Shaft', qty: 1, price: 285.00, availability: 'in_stock' },
                ]
            },
            '4L80E': {
                name: '4L80E (GM)',
                parts: [
                    { id: 'GM80-1', name: 'Forward Clutch Pack', qty: 1, price: 165.00, availability: 'in_stock' },
                    { id: 'GM80-2', name: 'Direct Clutch Pack', qty: 1, price: 175.00, availability: 'in_stock' },
                ]
            },
            'TH400': {
                name: 'TH400 (GM Classic)',
                parts: [
                    { id: 'TH-1', name: 'Forward Clutch Pack', qty: 1, price: 95.00, availability: 'in_stock' },
                    { id: 'TH-2', name: 'Direct Clutch Pack', qty: 1, price: 105.00, availability: 'in_stock' },
                ]
            }
        };

        const QUICK_LINKS = [
            { name: 'Transend', url: 'https://transend.us', icon: '🔧' },
            { name: 'WitTrans', url: 'https://www.wittrans.com', icon: '⚙️' },
            { name: 'TransGo', url: 'https://transgo.com/our-products/', icon: '⚡' },
            { name: 'Sonnax', url: 'https://www.sonnax.com', icon: '🛠️' },
            { name: 'RockAuto', url: 'https://www.rockauto.com', icon: '💰' },
            { name: 'eBay', url: 'https://www.ebay.com', icon: '🏪' },
        ];

        function setState(newState) {
            appState = { ...appState, ...newState };
            render();
        }

        function updateView(view) {
            setState({ currentView: view, showVINModal: false });
        }

        function formatCurrency(value) {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(value);
        }

        function getAvailabilityBadge(status) {
            if (status === 'in_stock') return '<span class="badge badge-success">✓ In Stock</span>';
            if (status === 'special_order') return '<span class="badge badge-warning">⏱ Special Order</span>';
            return '<span class="badge badge-danger">✗ Unavailable</span>';
        }

        function getCurrentTime() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            const timeStr = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
            return `${dateStr} • ${timeStr} ${tz}`;
        }

        function renderHome() {
            return `
                <div class="page">
                    <div class="container">
                        <div class="home-header">
                            <h1 class="home-title">FALCON TRANSMISSION</h1>
                            <p class="home-subtitle">Shop Management Suite</p>
                        </div>

                        <div class="icon-grid">
                            <button class="icon-btn highlight no-print" onclick="updateView('quote-builder')">
                                <div class="icon-btn-icon">📋</div>
                                <div class="icon-btn-label">New Quote</div>
                            </button>
                            <button class="icon-btn no-print" onclick="setState({ showVINModal: true })">
                                <div class="icon-btn-icon">🔍</div>
                                <div class="icon-btn-label">VIN Lookup</div>
                            </button>
                            <button class="icon-btn no-print" onclick="updateView('parts-search')">
                                <div class="icon-btn-icon">🔧</div>
                                <div class="icon-btn-label">Parts Search</div>
                            </button>
                            <button class="icon-btn no-print" onclick="updateView('transmission-search')">
                                <div class="icon-btn-icon">⚙️</div>
                                <div class="icon-btn-label">Transmission</div>
                            </button>
                            <button class="icon-btn no-print" onclick="updateView('active-quote')">
                                <div class="icon-btn-icon">📊</div>
                                <div class="icon-btn-label">Active Quote</div>
                            </button>
                            <button class="icon-btn no-print" onclick="updateView('quote-history')">
                                <div class="icon-btn-icon">📁</div>
                                <div class="icon-btn-label">Quote History</div>
                            </button>
                            <button class="icon-btn no-print" onclick="updateView('calendar')">
                                <div class="icon-btn-icon">📅</div>
                                <div class="icon-btn-label">Calendar</div>
                            </button>
                            <button class="icon-btn no-print" onclick="updateView('settings')">
                                <div class="icon-btn-icon">⚙️</div>
                                <div class="icon-btn-label">Settings</div>
                            </button>
                        </div>

                        ${QUICK_LINKS.map(link => `
                            <a href="${link.url}" target="_blank" rel="noopener noreferrer" class="icon-btn no-print" style="text-decoration: none;">
                                <div class="icon-btn-icon">${link.icon}</div>
                                <div class="icon-btn-label">${link.name}</div>
                            </a>
                        `).join('')}

                        <div class="time-display no-print">
                            <span id="time-display">${getCurrentTime()}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderQuoteBuilder() {
            return `
                <div class="page">
                    <div class="container">
                        <div class="page-header no-print">
                            <button class="back-btn" onclick="updateView('home')">← Back</button>
                            <h1>New Quote</h1>
                            <button class="btn btn-success no-print" onclick="window.print();">🖨️ Print</button>
                        </div>

                        <div id="quote-section">
                            <div class="card">
                                <div class="grid grid-2">
                                    <div>
                                        <label>Quote #</label>
                                        <input type="text" id="quoteNumber" class="input-field mt-2" value="FL-${Date.now().toString().slice(-6)}" readonly>
                                    </div>
                                    <div>
                                        <label>Date</label>
                                        <input type="date" id="quoteDate" class="input-field mt-2" value="${new Date().toISOString().split('T')[0]}">
                                    </div>
                                </div>
                            </div>

                            <div class="card">
                                <h3 class="card-title">Customer Information</h3>
                                <div class="grid grid-2">
                                    <input type="text" id="customerName" class="input-field" placeholder="Customer Name">
                                    <input type="tel" id="customerPhone" class="input-field" placeholder="Phone">
                                </div>
                                <input type="email" id="customerEmail" class="input-field mt-2" placeholder="Email">
                            </div>

                            <div class="card">
                                <h3 class="card-title">Vehicle Information</h3>
                                <div class="grid grid-2">
                                    <input type="text" id="vehicleYear" class="input-field" placeholder="Year">
                                    <input type="text" id="vehicleMake" class="input-field" placeholder="Make">
                                    <input type="text" id="vehicleModel" class="input-field" placeholder="Model">
                                    <input type="text" id="vehicleSubmodel" class="input-field" placeholder="Sub-Model">
                                    <input type="text" id="vehicleEngine" class="input-field" placeholder="Engine">
                                    <input type="text" id="vehicleDrive" class="input-field" placeholder="Drive Type">
                                </div>
                                <input type="text" id="vehicleVIN" class="input-field mt-2" placeholder="VIN">
                                <div class="mt-2">
                                    <label>Transmission Type</label>
                                    <select id="transmissionType" class="input-field mt-2">
                                        <option value="">Select Transmission</option>
                                        ${Object.keys(PARTS_CATALOG).map(key => `<option value="${key}">${PARTS_CATALOG[key].name}</option>`).join('')}
                                    </select>
                                </div>
                            </div>

                            <div class="card">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                                    <h3 class="card-title mb-0">Line Items</h3>
                                    <button class="btn btn-primary no-print" onclick="showLineItemForm()" style="margin-bottom: 0;">+ Add Item</button>
                                </div>

                                <div id="lineItemForm" class="hidden" style="background: #4b5563; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1rem;">
                                    <div class="grid grid-2 mb-2">
                                        <select id="itemType" class="input-field">
                                            <option value="part">Part</option>
                                            <option value="service">Service</option>
                                            <option value="labor">Labor</option>
                                        </select>
                                    </div>
                                    <input type="text" id="itemDescription" class="input-field mb-2" placeholder="Description">
                                    <div class="grid grid-2 gap" style="gap: 0.5rem;">
                                        <input type="number" id="itemQty" class="input-field" placeholder="Qty" value="1" min="1" step="0.1">
                                        <input type="number" id="itemPrice" class="input-field" placeholder="Price" value="0" min="0" step="0.01">
                                    </div>
                                    <div class="grid grid-2 gap mt-2" style="gap: 0.5rem;">
                                        <button class="btn btn-success" onclick="addLineItem()">Add Item</button>
                                        <button class="btn btn-secondary" onclick="hideLineItemForm()">Cancel</button>
                                    </div>
                                </div>

                                <div id="lineItems"></div>
                            </div>

                            <div class="card">
                                <div class="total-line">
                                    <span>Subtotal:</span>
                                    <span id="subtotal">$0.00</span>
                                </div>
                                <div class="total-line">
                                    <span>Tax (8%):</span>
                                    <span id="tax">$0.00</span>
                                </div>
                                <div class="total-line final">
                                    <span>TOTAL:</span>
                                    <span id="total">$0.00</span>
                                </div>
                            </div>

                            <div class="section no-print" style="margin-bottom: 2rem;">
                                <button class="btn btn-primary" onclick="window.print()" style="width: 100%; justify-content: center; margin-bottom: 0.5rem;">🖨️ Print Quote</button>
                                <button class="btn btn-success" onclick="exportPDF()" style="width: 100%; justify-content: center;">📥 Save as PDF</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderPartsSearch() {
            return `
                <div class="page">
                    <div class="container">
                        <button class="back-btn no-print" onclick="updateView('home')">← Back</button>
                        <h1 style="margin-bottom: 2rem;">Parts Search</h1>

                        <div class="card no-print">
                            <label>Select Transmission</label>
                            <select id="partsTransmission" class="input-field mt-2" onchange="updatePartsList()">
                                <option value="">Choose a transmission...</option>
                                ${Object.keys(PARTS_CATALOG).map(key => `<option value="${key}">${PARTS_CATALOG[key].name}</option>`).join('')}

                        </div>

                        <div id="partsList"></div>
                    </div>
                </div>
            `;
        }

        function renderTransmissionSearch() {
            return `
                <div class="page">
                    <div class="container">
                        <button class="back-btn no-print" onclick="updateView('home')">← Back</button>
                        <h1 style="margin-bottom: 2rem;">Transmission Selection</h1>

                        <div class="card no-print">
                            <label>Quick Select</label>
                            <select id="transSelect" class="input-field mt-2" onchange="updateTransmissionInfo()">
                                <option value="">Choose a transmission...</option>
                                ${Object.keys(PARTS_CATALOG).map(key => `<option value="${key}">${PARTS_CATALOG[key].name}</option>`).join('')}
                            </select>

                            <div id="transInfo" class="hidden mt-4"></div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderActiveQuote() {
            return `
                <div class="page">
                    <div class="container">
                        <button class="back-btn no-print" onclick="updateView('home')">← Back</button>
                        <h1 style="margin-bottom: 2rem;">Active Quotes</h1>

                        ${appState.quotes.map(quote => `
                            <div class="card">
                                <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 1rem;">
                                    <div>
                                        <h3 style="margin-bottom: 0.25rem;">Quote #${quote.quoteNumber}</h3>
                                        <p class="text-gray-400">${quote.customer}</p>
                                    </div>
                                    <span class="badge ${quote.status === 'approved' ? 'badge-success' : 'badge-warning'}">${quote.status}</span>
                                </div>
                                <div class="grid grid-4">
                                    <div>
                                        <p class="text-gray-400" style="font-size: 0.875rem;">Vehicle</p>
                                        <p style="font-weight: 600;">${quote.vehicle}</p>
                                    </div>
                                    <div>
                                        <p class="text-gray-400" style="font-size: 0.875rem;">Transmission</p>
                                        <p style="font-weight: 600;">${quote.transmission}</p>
                                    </div>
                                    <div>
                                        <p class="text-gray-400" style="font-size: 0.875rem;">Total</p>
                                        <p class="price">${formatCurrency(quote.total)}</p>
                                    </div>
                                    <div>
                                        <p class="text-gray-400" style="font-size: 0.875rem;">Date</p>
                                        <p style="font-weight: 600;">${new Date(quote.date).toLocaleDateString()}</p>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderQuoteHistory() {
            return `
                <div class="page">
                    <div class="container">
                        <button class="back-btn no-print" onclick="updateView('home')">← Back</button>
                        <h1 style="margin-bottom: 2rem;">Quote History</h1>

                        <div class="card no-print">
                            <input type="text" id="searchQuotes" class="input-field" placeholder="Search by quote #, customer, or vehicle..." onkeyup="filterQuoteHistory()">
                        </div>

                        <div id="quoteHistoryList"></div>
                    </div>
                </div>
            `;
        }

        function renderCalendar() {
            return `
                <div class="page">
                    <div class="container">
                        <button class="back-btn no-print" onclick="updateView('home')">← Back</button>
                        <h1 style="margin-bottom: 2rem;">📅 Calendar</h1>
                        <div class="card text-center">
                            <p class="text-gray-400">Calendar feature coming in Phase 2 with job scheduling</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderSettings() {
            return `
                <div class="page">
                    <div class="container">
                        <button class="back-btn no-print" onclick="updateView('home')">← Back</button>
                        <h1 style="margin-bottom: 2rem;">⚙️ Settings</h1>
                        <div class="card text-center">
                            <p class="text-gray-400">Settings coming in Phase 2 (Admin, Tax Rate, Labor Rates)</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderVINModal() {
            if (!appState.showVINModal) return '';
            return `
                <div class="modal-overlay no-print" onclick="event.target === this && setState({ showVINModal: false })">
                    <div class="modal">
                        <div class="modal-header">
                            <h2>VIN Lookup</h2>
                            <button class="modal-close" onclick="setState({ showVINModal: false })">✕</button>
                        </div>
                        <div class="modal-body">
                            <p class="text-gray-400 mb-4">Select a vendor to look up vehicle information by VIN:</p>
                            <a href="https://transend.us" target="_blank" class="btn btn-primary" style="width: 100%; justify-content: center; margin-bottom: 1rem;">🔍 Open Transend.us VIN Decoder</a>
                            <a href="https://www.wittrans.com" target="_blank" class="btn btn-primary" style="width: 100%; justify-content: center;">🔍 Open WitTrans VIN Decoder</a>
                        </div>
                        <div class="modal-footer">
                            <button class="btn btn-secondary" onclick="setState({ showVINModal: false })" style="flex: 1;">Close</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function showLineItemForm() {
            document.getElementById('lineItemForm').classList.remove('hidden');
        }

        function hideLineItemForm() {
            document.getElementById('lineItemForm').classList.add('hidden');
        }

        function addLineItem() {
            const desc = document.getElementById('itemDescription').value;
            const qty = parseFloat(document.getElementById('itemQty').value) || 1;
            const price = parseFloat(document.getElementById('itemPrice').value) || 0;

            if (!desc || price <= 0) {
                alert('Please enter description and price');
                return;
            }

            if (!appState.currentQuote) appState.currentQuote = { lineItems: [] };
            appState.currentQuote.lineItems = appState.currentQuote.lineItems || [];
            appState.currentQuote.lineItems.push({ id: Date.now(), description: desc, quantity: qty, price: price });

            document.getElementById('itemDescription').value = '';
            document.getElementById('itemQty').value = '1';
            document.getElementById('itemPrice').value = '0';
            hideLineItemForm();
            renderLineItems();
            updateTotals();
        }

        function removeLineItem(id) {
            appState.currentQuote.lineItems = appState.currentQuote.lineItems.filter(item => item.id !== id);
            renderLineItems();
            updateTotals();
        }

        function renderLineItems() {
            if (!appState.currentQuote || !appState.currentQuote.lineItems) {
                document.getElementById('lineItems').innerHTML = '<p class="text-gray-400 text-center" style="padding: 2rem;">No line items yet.</p>';
                return;
            }

            const html = appState.currentQuote.lineItems.map(item => `
                <div class="quote-item">
                    <div class="quote-item-info">
                        <h4>${item.description}</h4>
                        <p>${item.quantity}x @ ${formatCurrency(item.price)} = ${formatCurrency(item.quantity * item.price)}</p>
                    </div>
                    <button class="btn btn-danger no-print" onclick="removeLineItem(${item.id})" style="padding: 0.5rem;">✕</button>
                </div>
            `).join('');

            document.getElementById('lineItems').innerHTML = html;
        }

        function updateTotals() {
            if (!appState.currentQuote || !appState.currentQuote.lineItems) return;

            const subtotal = appState.currentQuote.lineItems.reduce((sum, item) => sum + (item.quantity * item.price), 0);
            const tax = subtotal * 0.08;
            const total = subtotal + tax;

            document.getElementById('subtotal').textContent = formatCurrency(subtotal);
            document.getElementById('tax').textContent = formatCurrency(tax);
            document.getElementById('total').textContent = formatCurrency(total);
        }

        function updatePartsList() {
            const trans = document.getElementById('partsTransmission').value;
            if (!trans) {
                document.getElementById('partsList').innerHTML = '';
                return;
            }

            const catalog = PARTS_CATALOG[trans];
            const html = catalog.parts.map(part => `
                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: start;">
                        <div style="flex: 1;">
                            <h4 style="margin-bottom: 0.5rem;">${part.name}</h4>
                            <p class="text-gray-400" style="font-size: 0.875rem; margin-bottom: 0.5rem;">Part ID: ${part.id}</p>
                            <p class="price">${formatCurrency(part.price)}</p>
                        </div>
                        <div style="text-align: right; margin-left: 1rem;">
                            <p class="text-gray-400" style="font-size: 0.875rem; margin-bottom: 0.5rem;">Qty: ${part.qty}</p>
                            ${getAvailabilityBadge(part.availability)}
                        </div>
                    </div>
                </div>
            `).join('');

            document.getElementById('partsList').innerHTML = html;
        }

        function updateTransmissionInfo() {
            const trans = document.getElementById('transSelect').value;
            if (!trans) {
                document.getElementById('transInfo').classList.add('hidden');
                return;
            }

            const catalog = PARTS_CATALOG[trans];
            const html = `
                <div style="background: #4b5563; padding: 1rem; border-radius: 0.5rem; border-left: 4px solid #FF6B35;">
                    <h4 style="margin-bottom: 0.75rem;">${catalog.name}</h4>
                    <p class="text-gray-400 mb-2">Available Parts:</p>
                    <div class="grid grid-2" style="gap: 0.5rem;">
                        ${catalog.parts.slice(0, 5).map(part => `
                            <div style="background: #374151; padding: 0.75rem; border-radius: 0.375rem;">
                                <p style="font-weight: 600; font-size: 0.875rem; margin-bottom: 0.25rem;">${part.name}</p>
                                <p class="price" style="font-size: 1rem;">${formatCurrency(part.price)}</p>
                            </div>
                        `).join('')}
                    </div>
                    ${catalog.parts.length > 5 ? `<p class="text-gray-400 mt-2" style="font-size: 0.875rem;">...and ${catalog.parts.length - 5} more parts</p>` : ''}
                </div>
            `;

            document.getElementById('transInfo').innerHTML = html;
            document.getElementById('transInfo').classList.remove('hidden');
        }

        function filterQuoteHistory() {
            const search = document.getElementById('searchQuotes').value.toLowerCase();
            const filtered = appState.quotes.filter(q =>
                q.quoteNumber.toLowerCase().includes(search) ||
                q.customer.toLowerCase().includes(search) ||
                q.vehicle.toLowerCase().includes(search)
            );

            const html = filtered.map(quote => `
                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: start;">
                        <div style="flex: 1;">
                            <h4 style="margin-bottom: 0.25rem;">Quote #${quote.quoteNumber}</h4>
                            <p class="text-gray-400" style="font-size: 0.875rem;">${quote.customer} • ${quote.vehicle}</p>
                        </div>
                        <div style="text-align: right; margin-left: 1rem;">
                            <p class="price">${formatCurrency(quote.total)}</p>
                            <p class="text-gray-400" style="font-size: 0.875rem;">${new Date(quote.date).toLocaleDateString()}</p>
                        </div>
                    </div>
                </div>
            `).join('');

            document.getElementById('quoteHistoryList').innerHTML = html || '<div class="text-center text-gray-400">No quotes found.</div>';
        }

        function exportPDF() {
            const quoteNum = document.getElementById('quoteNumber').value;
            const customerName = document.getElementById('customerName').value;
            const total = document.getElementById('total').textContent;

            const html = `
<!DOCTYPE html>
<html>
<head>
    <title>Quote ${quoteNum}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: white; color: #000; }
        .header { margin-bottom: 30px; border-bottom: 3px solid #FF6B35; padding-bottom: 20px; }
        h1 { margin: 0; color: #000; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        th { background: #f0f0f0; padding: 10px; text-align: left; font-weight: bold; border-bottom: 1px solid #ccc; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .totals { text-align: right; width: 50%; margin-left: auto; }
        .total-line { margin: 10px 0; font-weight: bold; }
        .price { color: #FF6B35; }
    </style>
</head>
<body>
    <div class="header">
        <h1>FALCON TRANSMISSION</h1>
        <p>Quote #${quoteNum} | Customer: ${customerName}</p>
        <p>Date: ${new Date().toLocaleDateString()}</p>
    </div>
    <table>
        <thead>
            <tr>
                <th>Description</th>
                <th>Qty</th>
                <th>Price</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody>
            ${(appState.currentQuote?.lineItems || []).map(item => `<tr><td>${item.description}</td><td>${item.quantity}</td><td>${formatCurrency(item.price)}</td><td>${formatCurrency(item.quantity * item.price)}</td></tr>`).join('')}
        </tbody>
    </table>
    <div class="totals">
        <div class="total-line">Subtotal: ${document.getElementById('subtotal').textContent}</div>
        <div class="total-line">Tax: ${document.getElementById('tax').textContent}</div>
        <div class="total-line price" style="font-size: 18px; border-top: 2px solid #FF6B35; padding-top: 10px;">TOTAL: ${total}</div>
    </div>
</body>
</html>
            `;

            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `quote-${quoteNum}.html`;
            a.click();
        }

        function render() {
            let content = '';

            switch (appState.currentView) {
                case 'home':
                    content = renderHome();
                    break;
                case 'quote-builder':
                    appState.currentQuote = { lineItems: [] };
                    content = renderQuoteBuilder();
                    break;
                case 'parts-search':
                    content = renderPartsSearch();
                    break;
                case 'transmission-search':
                    content = renderTransmissionSearch();
                    break;
                case 'active-quote':
                    content = renderActiveQuote();
                    break;
                case 'quote-history':
                    content = renderQuoteHistory();
                    break;
                case 'calendar':
                    content = renderCalendar();
                    break;
                case 'settings':
                    content = renderSettings();
                    break;
            }

            document.getElementById('root').innerHTML = content + renderVINModal();

            if (appState.currentView === 'home') {
                const timeDisplay = document.getElementById('time-display');
                if (timeDisplay) {
                    timeDisplay.textContent = getCurrentTime();
                    setInterval(() => {
                        const td = document.getElementById('time-display');
                        if (td) td.textContent = getCurrentTime();
                    }, 1000);
                }
            }

            if (appState.currentView === 'quote-builder') {
                renderLineItems();
                updateTotals();
            }

            if (appState.currentView === 'quote-history') {
                filterQuoteHistory();
            }
        }

        render();
    </script>
</body>
</html>
