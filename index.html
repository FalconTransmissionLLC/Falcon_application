<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Falcon Transmission - Professional Shop Management & Quoting System">
    <meta name="theme-color" content="#0f0f0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Falcon TX">
    <title>Falcon Transmission - Shop Manager</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;600;700;900&family=Poppins:wght@700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            width: 100%;
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 50%, #0f0f0f 100%);
            color: #fff;
            line-height: 1.6;
            overflow-x: hidden;
        }

        body {
            -webkit-user-select: none;
            user-select: none;
        }

        body.light-mode {
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 50%, #f5f5f5 100%);
            color: #333;
        }

        input, select, textarea, button {
            font-family: inherit;
            font-size: inherit;
            -webkit-user-select: text;
            user-select: text;
        }

        #root {
            min-height: 100vh;
            width: 100%;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        body.light-mode ::-webkit-scrollbar-track {
            background: #e8e8e8;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #DC143C 0%, #FF1744 100%);
            border-radius: 4px;
        }

        :root {
            --primary: #DC143C;
            --primary-dark: #B20530;
            --primary-light: #FF1744;
            --accent: #C0C0C0;
            --dark: #0f0f0f;
            --card-bg: #1a1a1a;
            --border: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
        }

        body.light-mode {
            --dark: #f5f5f5;
            --card-bg: #ffffff;
            --border: #e0e0e0;
            --text-primary: #333333;
            --text-secondary: #666666;
        }

        .container {
            max-width: 1024px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .logo-header {
            text-align: center;
            margin-bottom: 2rem;
            padding: 1.5rem 0;
        }

        .logo-img {
            max-width: 180px;
            height: auto;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 20px rgba(220, 20, 60, 0.3));
        }

        body.light-mode .logo-img {
            filter: drop-shadow(0 0 20px rgba(220, 20, 60, 0.2));
        }

        .logo-text {
            font-family: 'Poppins', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #DC143C 0%, #FF1744 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .logo-subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            letter-spacing: 1px;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, var(--card-bg) 0%, #252525 100%);
            border: 2px solid var(--border);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .theme-toggle:hover {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(220, 20, 60, 0.3);
        }

        .btn {
            padding: 0.875rem 1.25rem;
            border: none;
            border-radius: 0.625rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(220, 20, 60, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 8px 25px rgba(220, 20, 60, 0.5);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--card-bg);
            color: white;
            border: 2px solid var(--border);
        }

        body.light-mode .btn-secondary {
            color: #333;
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(220, 20, 60, 0.2);
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .btn-success:hover {
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.5);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            box-shadow: 0 8px 25px rgba(239, 68, 68, 0.5);
            transform: translateY(-2px);
        }

        .input-field {
            background: var(--card-bg);
            border: 2px solid var(--border);
            color: var(--text-primary);
            padding: 0.875rem 1rem;
            border-radius: 0.625rem;
            width: 100%;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(220, 20, 60, 0.1);
        }

        .input-field::placeholder {
            color: var(--text-secondary);
        }

        select.input-field {
            cursor: pointer;
        }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 1.25rem;
            margin-bottom: 2rem;
        }

        @media (min-width: 640px) {
            .icon-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 1.5rem;
            }
        }

        .icon-btn {
            background: linear-gradient(135deg, var(--card-bg) 0%, #252525 100%);
            border: 2px solid var(--border);
            border-radius: 1.25rem;
            padding: 1.75rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            color: white;
            text-decoration: none;
            aspect-ratio: 1;
            position: relative;
            overflow: hidden;
        }

        body.light-mode .icon-btn {
            color: #333;
        }

        .icon-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(220, 20, 60, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .icon-btn:hover::before {
            left: 100%;
        }

        .icon-btn:hover {
            border-color: var(--primary);
            box-shadow: 0 8px 30px rgba(220, 20, 60, 0.3);
            transform: translateY(-4px);
        }

        .icon-btn-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
        }

        .icon-btn-label {
            font-size: 0.85rem;
            font-weight: 700;
            text-align: center;
            line-height: 1.3;
            letter-spacing: 0.3px;
        }

        .card {
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 1rem;
            padding: 1.75rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: var(--primary);
            box-shadow: 0 8px 25px rgba(220, 20, 60, 0.1);
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 1.25rem;
            color: var(--text-primary);
            font-family: 'Poppins', sans-serif;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
        }

        .modal {
            background: var(--card-bg);
            border: 2px solid var(--primary);
            border-radius: 1.5rem;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(220, 20, 60, 0.3);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.75rem;
            border-bottom: 2px solid var(--border);
        }

        .modal-header h2 {
            font-size: 1.6rem;
            font-weight: 700;
            font-family: 'Poppins', sans-serif;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.75rem;
            padding: 0;
            width: 2.5rem;
            height: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            color: var(--primary);
            transform: rotate(90deg);
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 1.75rem;
        }

        .modal-footer {
            padding: 1.75rem;
            border-top: 2px solid var(--border);
            display: flex;
            gap: 1rem;
        }

        .grid {
            display: grid;
            gap: 1rem;
        }

        .grid-2 {
            grid-template-columns: 1fr;
        }

        @media (min-width: 640px) {
            .grid-2 {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .grid-4 {
            grid-template-columns: repeat(2, 1fr);
        }

        @media (min-width: 768px) {
            .grid-4 {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .back-btn {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            color: var(--primary-light);
            transform: translateX(-4px);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .badge-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }

        .badge-warning {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
        }

        .badge-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        .price {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--primary);
            font-family: 'Poppins', sans-serif;
        }

        .total-line {
            display: flex;
            justify-content: space-between;
            padding: 1rem 0;
            border-bottom: 2px solid var(--border);
            font-size: 1.1rem;
        }

        .total-line.final {
            border-bottom: 3px solid var(--primary);
            font-size: 1.4rem;
            font-weight: 800;
            padding-top: 1.25rem;
            margin-top: 1rem;
            color: var(--primary);
        }

        .time-display {
            background: linear-gradient(135deg, rgba(220, 20, 60, 0.1) 0%, rgba(220, 20, 60, 0.05) 100%);
            border: 2px solid var(--primary);
            border-radius: 0.75rem;
            padding: 1.25rem;
            text-align: center;
            font-family: 'Courier New', monospace;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .quote-item {
            background: linear-gradient(135deg, #252525 0%, #2a2a2a 100%);
            padding: 1.25rem;
            border-radius: 0.75rem;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        body.light-mode .quote-item {
            background: linear-gradient(135deg, #f9f9f9 0%, #f5f5f5 100%);
        }

        .quote-item:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 15px rgba(220, 20, 60, 0.1);
        }

        .quote-item-info h4 {
            margin-bottom: 0.375rem;
            color: var(--text-primary);
            font-weight: 700;
        }

        .quote-item-info p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .hidden {
            display: none;
        }

        .text-center {
            text-align: center;
        }

        .text-gray-400 {
            color: var(--text-secondary);
        }

        .mb-0 { margin-bottom: 0; }
        .mb-2 { margin-bottom: 0.5rem; }
        .mb-4 { margin-bottom: 1rem; }
        .mt-2 { margin-top: 0.5rem; }
        .mt-4 { margin-top: 1rem; }

        .page {
            min-height: 100vh;
            padding: 1.5rem;
        }

        .home-header {
            margin-bottom: 2.5rem;
        }

        @media print {
            body {
                background: white;
                color: #000;
            }
            .page {
                background: white;
                padding: 0;
            }
            .no-print, .back-btn, button, .modal-overlay, .theme-toggle, .logo-header {
                display: none !important;
            }
            .card {
                page-break-inside: avoid;
                border: 1px solid #ccc;
            }
        }
    </style>
</head>
<body>
    <div class="theme-toggle no-print" onclick="toggleTheme()" title="Toggle Dark/Light Mode">
        <span id="themeIcon">🌙</span>
    </div>
    <div id="root"></div>

    <script>
        // ==================== THEME MANAGEMENT ====================
        function toggleTheme() {
            const isDarkMode = document.body.classList.contains('light-mode');
            if (isDarkMode) {
                document.body.classList.remove('light-mode');
                document.getElementById('themeIcon').textContent = '🌙';
                localStorage.setItem('theme', 'dark');
            } else {
                document.body.classList.add('light-mode');
                document.getElementById('themeIcon').textContent = '☀️';
                localStorage.setItem('theme', 'light');
            }
        }

        // Load saved theme
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'light') {
            document.body.classList.add('light-mode');
            document.getElementById('themeIcon').textContent = '☀️';
        }

        // ==================== LOCAL STORAGE ====================
        function saveQuotes() {
            localStorage.setItem('falconQuotes', JSON.stringify(appState.quotes));
        }

        function loadQuotes() {
            const saved = localStorage.getItem('falconQuotes');
            if (saved) {
                appState.quotes = JSON.parse(saved);
            }
        }

        // ==================== APP STATE ====================
        let appState = {
            currentView: 'home',
            showVINModal: false,
            currentQuote: null,
            quotes: [
                { id: 1, quoteNumber: 'FL-001234', customer: 'John Doe', vehicle: '2015 Chevy Silverado', transmission: '4L60E', status: 'pending', total: 3450.00, date: '2024-01-15' },
                { id: 2, quoteNumber: 'FL-001235', customer: 'Jane Smith', vehicle: '2018 Ford F-150', transmission: '10R80', status: 'approved', total: 4250.00, date: '2024-01-16' }
            ]
        };

        loadQuotes();

        // ==================== PARTS CATALOG ====================
        const PARTS_CATALOG = {
            'AW 450-43LE': {
                name: 'AW 450-43LE',
                parts: [
                    { id: '49122', name: 'Overdrive Direct Steel', qty: 3, price: 45.00, availability: 'in_stock' },
                    { id: '49124', name: '2nd Brake Steel', qty: 5, price: 55.00, availability: 'in_stock' },
                    { id: '49134', name: 'Low Reverse Steel', qty: 6, price: 50.00, availability: 'special_order' },
                    { id: '49140', name: 'Overdrive Brake Plate', qty: 1, price: 125.00, availability: 'in_stock' },

                ]
            },
            '4L60E': {
                name: '4L60E (GM)',
                parts: [
                    { id: 'GM-1', name: 'Forward Clutch Pack', qty: 1, price: 145.00, availability: 'in_stock' },
                    { id: 'GM-2', name: 'Direct Clutch Pack', qty: 1, price: 155.00, availability: 'in_stock' },
                    { id: 'GM-3', name: 'Low/Reverse Clutch', qty: 1, price: 165.00, availability: 'special_order' },
                    { id: 'GM-4', name: 'Input Shaft', qty: 1, price: 225.00, availability: 'in_stock' },
                    { id: 'GM-5', name: 'Output Shaft', qty: 1, price: 285.00, availability: 'in_stock' },
                ]
            },
            '4L80E': {
                name: '4L80E (GM)',
                parts: [
                    { id: 'GM80-1', name: 'Forward Clutch Pack', qty: 1, price: 165.00, availability: 'in_stock' },
                    { id: 'GM80-2', name: 'Direct Clutch Pack', qty: 1, price: 175.00, availability: 'in_stock' },
                ]
            },
            'TH400': {
                name: 'TH400 (GM Classic)',
                parts: [
                    { id: 'TH-1', name: 'Forward Clutch Pack', qty: 1, price: 95.00, availability: 'in_stock' },
                    { id: 'TH-2', name: 'Direct Clutch Pack', qty: 1, price: 105.00, availability: 'in_stock' },
                ]
            },
            '700R4': {
                name: '700R4 (GM)',
                parts: [
                    { id: 'GM700-1', name: 'Overdrive Clutch Pack', qty: 1, price: 135.00, availability: 'in_stock' },
                    { id: 'GM700-2', name: 'Intermediate Clutch', qty: 1, price: 125.00, availability: 'in_stock' },
                    { id: 'GM700-3', name: 'Low/Reverse Band', qty: 1, price: 85.00, availability: 'special_order' },
                ]
            },
            'TH350': {
                name: 'TH350 (GM)',
                parts: [
                    { id: 'TH350-1', name: 'Forward Clutch Pack', qty: 1, price: 105.00, availability: 'in_stock' },
                    { id: 'TH350-2', name: 'Direct Clutch Pack', qty: 1, price: 115.00, availability: 'in_stock' },
                ]
            }
        };

        const QUICK_LINKS = [
            { name: 'Transend', url: 'https://transend.us', icon: '🔧' },
            { name: 'WitTrans', url: 'https://www.wittrans.com', icon: '⚙️' },
            { name: 'TransGo', url: 'https://transgo.com/our-products/', icon: '⚡' },
            { name: 'Sonnax', url: 'https://www.sonnax.com', icon: '🛠️' },
            { name: 'RockAuto', url: 'https://www.rockauto.com', icon: '💰' },
            { name: 'eBay', url: 'https://www.ebay.com', icon: '🏪' },
        ];

        // ==================== UTILITY FUNCTIONS ====================
        function setState(newState) {
            appState = { ...appState, ...newState };
            render();
        }

        function updateView(view) {
            setState({ currentView: view, showVINModal: false });
        }

        function formatCurrency(value) {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(value);
        }

        function getAvailabilityBadge(status) {
            if (status === 'in_stock') return '<span class="badge badge-success">✓ In Stock</span>';
            if (status === 'special_order') return '<span class="badge badge-warning">⏱ Special Order</span>';
            return '<span class="badge badge-danger">✗ Unavailable</span>';
        }

        function getCurrentTime() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            const timeStr = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
            return `${dateStr} • ${timeStr} ${tz}`;
        }

        // ==================== RENDER FUNCTIONS ====================
        function renderHome() {
            return `
                <div class="page">
                    <div class="container">
                        <div class="logo-header">
                            <div class="logo-text">FALCON</div>
                            <div class="logo-subtitle">TRANSMISSION LLC</div>
                            <p style="color: var(--text-secondary); margin-top: 0.5rem; font-size: 0.9rem;">Professional Shop Management Suite</p>
                        </div>

                        <div class="icon-grid">
                            <button class="icon-btn no-print" onclick="updateView('quote-builder')">
                                <div class="icon-btn-icon">📋</div>
                                <div class="icon-btn-label">New Quote</div>
                            </button>
                            <button class="icon-btn no-print" onclick="setState({ showVINModal: true })">
                                <div class="icon-btn-icon">🔍</div>
                                <div class="icon-btn-label">VIN Lookup</div>
                            </button>
                            <button class="icon-btn no-print" onclick="updateView('parts-search')">
                                <div class="icon-btn-icon">🔧</div>
                                <div class="icon-btn-label">Parts Search</div>
                            </button>
                            <button class="icon-btn no-print" onclick="updateView('transmission-search')">
                                <div class="icon-btn-icon">⚙️</div>
                                <div class="icon-btn-label">Transmission</div>
                            </button>
                            <button class="icon-btn no-print" onclick="updateView('active-quote')">
                                <div class="icon-btn-icon">📊</div>
                                <div class="icon-btn-label">Active Quote</div>
                            </button>
                            <button class="icon-btn no-print" onclick="updateView('quote-history')">
                                <div class="icon-btn-icon">📁</div>
                                <div class="icon-btn-label">Quote History</div>
                            </button>
                            <button class="icon-btn no-print" onclick="updateView('analytics')">
                                <div class="icon-btn-icon">📈</div>

        function addLineItem() {
            const desc = document.getElementById('itemDescription').value;
            const qty = parseFloat(document.getElementById('itemQty').value) || 1;
            const price = parseFloat(document.getElementById('itemPrice').value) || 0;

            if (!desc || price <= 0) {
                alert('Please enter description and price');
                return;
            }

            if (!appState.currentQuote) appState.currentQuote = { lineItems: [] };
            appState.currentQuote.lineItems = appState.currentQuote.lineItems || [];
            appState.currentQuote.lineItems.push({ id: Date.now(), description: desc, quantity: qty, price: price });

            document.getElementById('itemDescription').value = '';
            document.getElementById('itemQty').value = '1';
            document.getElementById('itemPrice').value = '0';
            hideLineItemForm();
            renderLineItems();
            updateTotals();
        }

        function removeLineItem(id) {
            appState.currentQuote.lineItems = appState.currentQuote.lineItems.filter(item => item.id !== id);
            renderLineItems();
            updateTotals();
        }

        function renderLineItems() {
            if (!appState.currentQuote || !appState.currentQuote.lineItems) {
                document.getElementById('lineItems').innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 2rem;">No line items yet.</p>';
                return;

            const html = appState.currentQuote.lineItems.map(item => `

                    <div class="quote-item-info">
                        <h4>${item.description}</h4>
                        <p>${item.quantity}x @ ${formatCurrency(item.price)} = ${formatCurrency(item.quantity * item.price)}</p>

            if (!appState.currentQuote || !appState.currentQuote.lineItems) return;

            document.getElementById('subtotal').textContent = formatCurrency(subtotal);

            document.getElementById('total').textContent = formatCurrency(total);

            `;

            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `quote-${quoteNum}.html`;
            a.click();
        }

        function clearAllData() {
            if (confirm('Are you sure you want to delete all quotes? This cannot be undone!')) {
                appState.quotes = [];
                saveQuotes();
                alert('All data cleared!');
                updateView('home');
            }
        }

        function exportData() {
            const data = JSON.stringify(appState.quotes, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `falcon-quotes-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        // ==================== MAIN RENDER FUNCTION ====================
        function render() {
            let content = '';

            switch (appState.currentView) {
                case 'home':
                    content = renderHome();
                    break;
                case 'quote-builder':
                    appState.currentQuote = { lineItems: [] };
                    content = renderQuoteBuilder();
                    break;
                case 'parts-search':
                    content = renderPartsSearch();
                    break;
                case 'transmission-search':
                    content = renderTransmissionSearch();
                    break;
                case 'active-quote':
                    content = renderActiveQuote();
                    break;
                case 'quote-history':
                    content = renderQuoteHistory();
                    break;
                case 'analytics':
                    content = renderAnalytics();
                    break;
                case 'settings':
                    content = renderSettings();
                    break;
            }

            document.getElementById('root').innerHTML = content + renderVINModal();

            // Update theme display
            const themeDisplay = document.getElementById('themeDisplay');
            if (themeDisplay) {
                themeDisplay.textContent = document.body.classList.contains('light-mode') ? 'Light Mode' : 'Dark Mode';
            }

            // Calculate data size
            const dataSize = document.getElementById('dataSize');
            if (dataSize) {
                const size = (new Blob([JSON.stringify(appState.quotes)]).size / 1024).toFixed(2);
                dataSize.textContent = size + ' KB';
            }

            if (appState.currentView === 'home') {
                const timeDisplay = document.getElementById('time-display');
                if (timeDisplay) {
                    timeDisplay.textContent = getCurrentTime();
                    setInterval(() => {
                        const td = document.getElementById('time-display');
                        if (td) td.textContent = getCurrentTime();
                    }, 1000);
                }
            }

            if (appState.currentView === 'quote-builder') {
                renderLineItems();
                updateTotals();
            }

            if (appState.currentView === 'quote-history') {
                filterQuoteHistory();
            }
        }

        render();
    </script>
</body>
</html>
